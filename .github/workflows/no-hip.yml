name: No-HIP Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test without HIP
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --fresh --preset windows-ci-no-hip

      - name: Build
        run: cmake --build --preset windows-ci-no-hip

      - name: Test
        run: ctest --preset windows-ci-no-hip --output-on-failure
